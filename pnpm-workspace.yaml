packages:
  - packages/*
  - '!packages/register-tests'
  - packages/cli/src/plugins/__fixtures__/hardhat
  - packages/register-tests/*
  - playgrounds/*
  - site

auditConfig:
  ignoreGhsas:
    - GHSA-g3ch-rx76-35fx # vue-template-compiler: XSS via prototype pollution (Vue 2 EOL, no patch)
    - GHSA-ffrw-9mx8-89p8 # fast-redact: prototype pollution (withdrawn advisory)
    - GHSA-qpm2-6cq5-7pq5 # happy-dom: prototype pollution sandbox escape (dev-only)
    - GHSA-93m4-6634-74q7 # vite: server.fs.deny bypass via backslash on Windows
    - GHSA-29xp-372q-xqph # node-tar: race condition memory exposure in sync list
    - GHSA-mh29-5h37-fv8m # js-yaml: prototype pollution via merge (<<)
    - GHSA-5j98-mcp5-4vw2 # glob CLI: command injection via -c/--cmd
    - GHSA-92fh-27vv-894w # nanotar: path traversal in parseTar (no patch)
    - GHSA-677m-j7p3-52f9 # socket.io-parser: unbounded binary attachments DoS
    - GHSA-v2wj-q39q-566r # vite: server.fs.deny bypass with queries (patched versions blocked by minimumReleaseAge)
    - GHSA-p9ff-h696-f583 # vite: arbitrary file read via dev server WebSocket (patched versions blocked by minimumReleaseAge)
    - GHSA-4w7w-66w2-5vf9 # vite: path traversal in optimized deps .map handling (patched versions blocked by minimumReleaseAge)
    - GHSA-f886-m6hf-6m8v # brace-expansion: zero-step sequence DoS (transitive via testcontainers)

